<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3GPP Spec Diff Tool</title>
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border-color: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --diff-add-bg: #0a3820;
    --diff-add-line: #196c2e;
    --diff-add-num: #196c2e;
    --diff-del-bg: #3d1618;
    --diff-del-line: #a83036;
    --diff-del-num: #a83036;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    font-size: 14px;
  }

  /* Header */
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    z-index: 10;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 600;
    white-space: nowrap;
  }
  .header h1 span { color: var(--accent); }
  .selector-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .selector-group label {
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 500;
  }
  .selector-group select, .selector-group input {
    background: var(--bg-tertiary);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    min-width: 120px;
  }
  .selector-group select:focus {
    border-color: var(--accent);
  }
  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-secondary:hover { opacity: 0.7; }

  /* Stats bar */
  .stats-bar {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    padding: 8px 20px;
    font-size: 12px;
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .stat { display: flex; align-items: center; gap: 4px; }
  .stat-added { color: var(--green); }
  .stat-deleted { color: var(--red); }
  .stat-modified { color: var(--yellow); }
  .stat-unchanged { color: var(--text-secondary); }
  .stat-total { color: var(--text-primary); }

  /* Main layout */
  .main {
    display: flex;
    height: calc(100vh - 100px);
  }

  /* TOC sidebar */
  .toc {
    width: 300px;
    min-width: 260px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border-color);
    overflow-y: auto;
    padding: 8px 0;
    font-size: 13px;
  }
  .toc::-webkit-scrollbar { width: 6px; }
  .toc::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

  .toc-toggle {
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border-color);
  }
  .toc-toggle:hover { color: var(--accent); }

  .toc-item {
    padding: 4px 16px 4px calc(16px + var(--indent, 0) * 16px);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    transition: background .15s, color .15s;
    border-left: 3px solid transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toc-item:hover {
    background: var(--bg-tertiary);
    color: var(--text-primary);
  }
  .toc-item.active {
    color: var(--text-primary);
    background: rgba(88,166,255,0.1);
    border-left-color: var(--accent);
  }
  .toc-item .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .toc-item .status-dot.added { background: var(--green); }
  .toc-item .status-dot.deleted { background: var(--red); }
  .toc-item .status-dot.modified { background: var(--yellow); }
  .toc-item .toc-id {
    color: var(--accent);
    font-family: monospace;
    font-size: 11px;
    flex-shrink: 0;
  }
  .toc-item .toc-title {
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toc-folder {
    padding: 2px 16px 2px calc(16px + var(--indent, 0) * 16px);
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .toc-folder:hover { color: var(--text-primary); }
  .toc-folder .arrow { font-size: 10px; transition: transform .15s; }
  .toc-folder .arrow.open { transform: rotate(90deg); }
  .toc-children { display: none; }
  .toc-children.open { display: block; }

  /* Diff content */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    background: var(--bg-primary);
  }
  .content::-webkit-scrollbar { width: 8px; }
  .content::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

  /* Diff header */
  .diff-header {
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-color);
  }
  .diff-header h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .diff-header .subtitle { color: var(--text-secondary); font-size: 13px; }
  .diff-header .spec-link {
    color: var(--accent);
    text-decoration: none;
    font-family: monospace;
  }
  .diff-header .spec-link:hover { text-decoration: underline; }

  /* Clause diff */
  .clause-diff {
    margin-bottom: 24px;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    overflow: hidden;
  }
  .clause-diff-header {
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border-color);
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .clause-diff-header .clause-id {
    color: var(--accent);
    font-family: monospace;
  }
  .clause-diff-header .status-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 12px;
    text-transform: uppercase;
  }
  .status-badge.added { background: var(--diff-add-bg); color: var(--green); }
  .status-badge.deleted { background: var(--diff-del-bg); color: var(--red); }
  .status-badge.modified { background: #3d2e00; color: var(--yellow); }
  .status-badge.unchanged { background: var(--bg-tertiary); color: var(--text-secondary); }

  /* Diff view (two-pane) */
  .diff-view {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .diff-pane {
    overflow-x: auto;
  }
  .diff-pane + .diff-pane {
    border-left: 1px solid var(--border-color);
  }
  .diff-pane-header {
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border-color);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  .diff-pane-header.old { border-bottom-color: var(--diff-del-line); }
  .diff-pane-header.new { border-bottom-color: var(--diff-add-line); }

  .diff-line {
    display: flex;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  .diff-line-num {
    width: 50px;
    min-width: 50px;
    text-align: right;
    padding: 0 10px;
    color: var(--text-secondary);
    user-select: none;
    font-size: 11px;
  }
  .diff-line-content {
    flex: 1;
    padding: 0 12px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .diff-line.add { background: var(--diff-add-bg); }
  .diff-line.add .diff-line-num { background: var(--diff-add-num); }
  .diff-line.del { background: var(--diff-del-bg); }
  .diff-line.del .diff-line-num { background: var(--diff-del-num); }

  /* Empty single-pane for added/deleted */
  .diff-empty {
    padding: 40px;
    text-align: center;
    color: var(--text-secondary);
    font-size: 13px;
  }

  /* Unchanged clause body */
  .clause-body {
    padding: 16px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-secondary);
    white-space: pre-wrap;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
  }
  .clause-body.collapsed {
    max-height: 120px;
    overflow: hidden;
    position: relative;
  }
  .clause-body.collapsed::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background: linear-gradient(transparent, var(--bg-primary));
  }
  .expand-btn {
    display: block;
    width: 100%;
    padding: 6px;
    text-align: center;
    font-size: 11px;
    color: var(--accent);
    cursor: pointer;
    border: none;
    background: var(--bg-tertiary);
    border-top: 1px solid var(--border-color);
  }
  .expand-btn:hover { background: var(--border-color); }

  /* Image thumbnails */
  .clause-images {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border-color);
    background: var(--bg-primary);
  }
  .clause-image {
    cursor: pointer;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    overflow: hidden;
    max-width: 180px;
    transition: border-color 0.15s;
    flex-shrink: 0;
  }
  .clause-image:hover {
    border-color: var(--accent);
  }
  .clause-image img {
    display: block;
    max-width: 100%;
    height: auto;
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.92);
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .lightbox.open {
    display: flex;
  }
  .lightbox-content {
    max-width: 92%;
    max-height: 92%;
    object-fit: contain;
    border-radius: 4px;
    cursor: default;
  }
  .lightbox-close {
    position: absolute;
    top: 24px;
    right: 32px;
    color: #aaa;
    font-size: 32px;
    font-weight: bold;
    cursor: pointer;
    z-index: 1001;
    line-height: 1;
  }
  .lightbox-close:hover {
    color: #fff;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-secondary);
    font-size: 14px;
  }
  .loading::after {
    content: '';
    width: 20px;
    height: 20px;
    border: 2px solid var(--border-color);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin-left: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    padding: 20px;
    color: var(--red);
    text-align: center;
  }

  /* Word-level diff highlighting */
  .word-del {
    background: var(--diff-del-bg);
    color: var(--red);
    text-decoration: line-through;
    border-radius: 2px;
    padding: 0 1px;
  }
  .word-add {
    background: var(--diff-add-bg);
    color: var(--green);
    border-radius: 2px;
    padding: 0 1px;
  }
  .diff-word-content {
    padding: 8px 12px;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
  }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-secondary);
    text-align: center;
    gap: 12px;
  }
  .welcome h2 {
    font-size: 24px;
    color: var(--text-primary);
  }
  .welcome p { max-width: 400px; line-height: 1.6; }

  /* Responsive */
  @media (max-width: 900px) {
    .toc { width: 220px; min-width: 180px; }
    .diff-view { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>&#9881;</span> 3GPP Spec Diff</h1>
  <div class="selector-group" id="specGroup">
    <label>Spec</label>
    <select id="specSelect">
      <option value="">Select spec...</option>
    </select>
    <input type="text" id="specInput" placeholder="New spec e.g. 23.501"
           style="width:140px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border-color);border-radius:6px;padding:6px 12px;font-size:13px;outline:none;">
    <button class="btn" id="downloadBtn">Download</button>
    <span id="downloadProgress" style="display:none;color:var(--text-secondary);font-size:12px;margin-left:8px;"></span>
  </div>
  <div class="selector-group">
    <label>Old Version</label>
    <select id="v1Select">
      <option value="">Select version...</option>
    </select>
  </div>
  <div class="selector-group">
    <label>New Version</label>
    <select id="v2Select">
      <option value="">Select version...</option>
    </select>
  </div>
  <button class="btn" id="diffBtn" disabled>Compare</button>
  <button class="btn btn-secondary" id="refreshBtn" style="display:none" onclick="runDiff(true)">&#x21bb; Refresh</button>
</div>

<div class="stats-bar" id="statsBar" style="display:none">
  <span class="stat stat-total" id="statTotal"></span>
  <span class="stat stat-added" id="statAdded"></span>
  <span class="stat stat-deleted" id="statDeleted"></span>
  <span class="stat stat-modified" id="statModified"></span>
</div>

<div class="main">
  <div class="toc" id="toc">
    <div class="toc-toggle" id="tocToggle">&#9654; Table of Contents</div>
    <div id="tocTree"></div>
  </div>
  <div class="content" id="content">
    <div class="welcome" id="welcome">
      <h2>&#128196; 3GPP Specification Diff</h2>
      <p>Select a specification and two versions above, then click <strong>Compare</strong> to see the difference.</p>
      <p style="font-size:12px;color:var(--text-secondary)">
        Data sourced from <a href="https://www.3gpp.org" target="_blank" style="color:var(--accent)">3gpp.org</a>.<br>
        Supports TS 23.501/502/503, 38.300/401, 33.501 for Rel-15 through Rel-19.
      </p>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <span class="lightbox-close" onclick="event.stopPropagation();closeLightbox()">&times;</span>
  <img class="lightbox-content" id="lightboxImg" alt="">
</div>

<script>
// ===================== STATE =====================
const state = {
  versions: [],
  diffData: null,
  currentSpec: '23.501',
  expandedClauses: new Set(),
};

// ===================== UTILITIES =====================
const $ = id => document.getElementById(id);
const escapeHtml = str => {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
};

function flattenClauseTree(clauses, depth = 0) {
  let result = [];
  for (const c of clauses) {
    result.push({ ...c, _depth: depth });
    if (c.children && c.children.length > 0) {
      result = result.concat(flattenClauseTree(c.children, depth + 1));
    }
  }
  return result;
}

function countClauses(clauses) {
  let n = 0;
  for (const c of clauses) {
    n++;
    if (c.children) n += countClauses(c.children);
  }
  return n;
}

// ===================== API =====================
async function fetchDiff(spec, v1, v2, refresh) {
  const url = `/api/diff?spec=${spec}&v1=${v1}&v2=${v2}` + (refresh ? '&refresh=1' : '');
  const resp = await fetch(url);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({error: resp.statusText}));
    throw new Error(err.error || resp.statusText);
  }
  return await resp.json();
}

// ===================== LIGHTBOX =====================
function openLightbox(src, alt) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  img.src = src;
  img.alt = alt || '';
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

// ===================== IMAGE THUMBNAILS =====================
function renderImageThumbnails(images, spec, version) {
  if (!images || images.length === 0) return '';
  let html = '<div class="clause-images">';
  for (const img of images) {
    const src = `/api/image/${spec}/${version}/${img.src}`;
    const alt = img.alt || '';
    html += `<div class="clause-image" onclick="event.stopPropagation();openLightbox('${src}','${escapeHtml(alt)}')">
      <img src="${src}" alt="${escapeHtml(alt)}" loading="lazy">
    </div>`;
  }
  html += '</div>';
  return html;
}

// ===================== VERSION SELECTORS =====================
// ===================== SPEC & VERSION LOADING =====================

async function loadSpecs() {
  try {
    const resp = await fetch('/api/specs');
    const specs = await resp.json();
    $('specSelect').innerHTML = specs.map(s =>
      `<option value="${s.id}">${s.title || 'TS ' + s.id}</option>`
    ).join('') || '<option value="">No specs downloaded</option>';

    if (specs.length > 0) {
      state.currentSpec = specs[0].id;
      $('specSelect').value = specs[0].id;
      await loadVersions();
    } else {
      $('v1Select').innerHTML = '<option value="">Download a spec first</option>';
      $('v2Select').innerHTML = '<option value="">Download a spec first</option>';
      $('diffBtn').disabled = true;
    }
  } catch (err) {
    console.error('loadSpecs:', err);
  }
}

async function loadVersions() {
  const spec = $('specSelect').value;
  if (!spec) return;
  state.currentSpec = spec;

  $('v1Select').innerHTML = '<option value="">Loading...</option>';
  $('v2Select').innerHTML = '<option value="">Loading...</option>';
  $('diffBtn').disabled = true;

  try {
    const resp = await fetch(`/api/versions?spec=${spec}`);
    const versions = await resp.json();
    state.versions = versions;

    if (versions.length === 0) {
      $('v1Select').innerHTML = '<option value="">No versions cached</option>';
      $('v2Select').innerHTML = '<option value="">No versions cached</option>';
      $('diffBtn').disabled = true;
      return;
    }

    const opts = versions.map(v =>
      `<option value="${v.version}">${v.label || 'Rel-' + v.release + ' (' + v.version + ')'}</option>`
    ).join('');

    $('v1Select').innerHTML = '<option value="">Select older version...</option>' + opts;
    $('v2Select').innerHTML = '<option value="">Select newer version...</option>' + opts;

    // Auto-select latest two releases
    if (versions.length >= 2) {
      const sorted = [...versions].sort((a, b) => b.release - a.release);
      $('v2Select').value = sorted[0].version;
      const prevRelease = sorted[0].release - 1;
      const prev = sorted.find(v => v.release === prevRelease && v.version.endsWith('.0.0'));
      if (prev) {
        $('v1Select').value = prev.version;
      } else if (sorted.length > 1) {
        $('v1Select').value = sorted[1].version;
      }
    }

    $('diffBtn').disabled = false;
  } catch (err) {
    $('v1Select').innerHTML = `<option value="">Error: ${err.message}</option>`;
    $('v2Select').innerHTML = `<option value="">Error: ${err.message}</option>`;
  }
}

// ===================== DOWNLOAD =====================

async function downloadSpec() {
  const spec = $('specInput').value.trim();
  if (!spec) { alert('Please enter a spec number'); return; }

  const btn = $('downloadBtn');
  const prog = $('downloadProgress');
  btn.disabled = true;
  btn.textContent = 'Starting...';
  prog.style.display = '';
  prog.textContent = 'Starting...';

  const startTime = Date.now();
  function elapsed() {
    const s = Math.round((Date.now() - startTime) / 1000);
    return s < 60 ? `${s}s` : `${Math.floor(s/60)}m${s%60}s`;
  }

  try {
    const resp = await fetch('/api/download', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({spec}),
    });
    const data = await resp.json();
    if (data.status === 'already_running') {
      prog.textContent = `[${elapsed()}] Already downloading...`;
    }

    // Poll until complete
    while (true) {
      await new Promise(r => setTimeout(r, 1000));
      const sr = await fetch(`/api/download-status?spec=${spec}`);
      const st = await sr.json();
           if (st.status === 'listing')      prog.textContent = `[${elapsed()}] Listing releases...`;
      else if (st.status === 'downloading')  prog.textContent = `[${elapsed()}] Downloading ${st.done}/${st.total} releases...`;
      else if (st.status === 'completed')    { prog.textContent = `[${elapsed()}] Download complete!`; break; }
      else if (st.status === 'error')        throw new Error(st.error || 'Download failed');
      /* else 'not_found' — keep polling */
    }

    // Refresh spec & version dropdowns
    await loadSpecs();
    const sel = $('specSelect');
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === spec) { sel.selectedIndex = i; break; }
    }
    await loadVersions();
    setTimeout(() => { prog.style.display = 'none'; }, 3000);
  } catch (err) {
    prog.textContent = `[${elapsed()}] Error: ${err.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Download';
  }
}

// ===================== TOC RENDER =====================
function renderToc(clauses) {
  const tree = $('tocTree');
  if (!clauses || clauses.length === 0) {
    tree.innerHTML = '<div class="toc-item" style="color:var(--text-secondary);padding:16px;">No clauses</div>';
    return;
  }

  let html = '';
  const flat = flattenClauseTree(clauses);

  for (const node of flat) {
    const indent = node._depth;
    const status = node.status || 'unchanged';
    const statusDot = status !== 'unchanged'
      ? `<span class="status-dot ${status}"></span>`
      : '<span class="status-dot" style="background:transparent"></span>';
    const id = node.id || '';

    html += `<div class="toc-item" style="--indent:${indent}" data-id="${escapeHtml(id)}"
      onclick="scrollToClause('${escapeHtml(id)}')">
      ${statusDot}
      <span class="toc-id">${escapeHtml(id)}</span>
      <span class="toc-title">${escapeHtml(node.title || '')}</span>
    </div>`;
  }

  tree.innerHTML = html;
}

// ===================== DIFF RENDER =====================
let _showUnchanged = false;

function renderDiff(diffData) {
  const container = $('content');
  const stats = diffData.stats;

  const total = stats.added + stats.deleted + stats.modified + stats.unchanged;
  const toggleId = 'uncToggle';
  let toggleHtml = '';
  if (stats.unchanged > 0) {
    toggleHtml = `<label style="margin-left:auto;font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--text-secondary)">
      <input type="checkbox" id="${toggleId}" ${_showUnchanged ? 'checked' : ''}> Show ${stats.unchanged} unchanged
    </label>`;
  }
  $('statsBar').innerHTML = `
    <span class="stat stat-total" id="statTotal">${total} total clauses</span>
    <span class="stat stat-added" id="statAdded">+${stats.added} added</span>
    <span class="stat stat-deleted" id="statDeleted">-${stats.deleted} deleted</span>
    <span class="stat stat-modified" id="statModified">~${stats.modified} modified</span>
    ${toggleHtml}
  `;
  $('statsBar').style.display = 'flex';

  const uncCb = $(toggleId);
  if (uncCb) {
    uncCb.addEventListener('change', () => {
      _showUnchanged = uncCb.checked;
      document.querySelectorAll('.clause-diff.unchanged').forEach(el => {
        el.style.display = _showUnchanged ? '' : 'none';
      });
    });
  }

  // Render TOC
  renderToc(diffData.clauses);
  $('tocToggle').innerHTML = '&#9660; Table of Contents';
  document.querySelectorAll('.toc-children').forEach(e => e.classList.add('open'));

  // First pass: render WITHOUT word-level diffs (fast)
  const flat = flattenClauseTree(diffData.clauses);
  let html = '';

  // Header
  html += `<div class="diff-header">
    <h2>${escapeHtml(diffData.title || '')}</h2>
    <div class="subtitle">
      <a class="spec-link" href="https://portal.3gpp.org/desktopmodules/Specifications/SpecificationDetails.aspx?specificationId=${diffData.spec.replace('.','')}" target="_blank">
        TS ${diffData.spec}
      </a>
      &mdash; Comparing <strong>v${diffData.old_version}</strong> (Rel-${diffData.old_release})
      vs <strong>v${diffData.new_version}</strong> (Rel-${diffData.new_release})
    </div>
  </div>`;

  const spec = diffData.spec;
  const oldVer = diffData.old_version;
  const newVer = diffData.new_version;
  for (const node of flat) {
    html += clauseDiffHtml(node, spec, oldVer, newVer, true /* skipWordDiff */);
  }

  container.innerHTML = html;

  // Apply unchanged visibility
  if (!_showUnchanged) {
    document.querySelectorAll('.clause-diff.unchanged').forEach(el => {
      el.style.display = 'none';
    });
  }

  // Second pass: compute word-level diffs progressively (does not block render)
  const modifiedNodes = flat.filter(n => n.status === 'modified');
  let wordIdx = 0;
  function processWordBatch() {
    const end = Math.min(wordIdx + 5, modifiedNodes.length);
    for (; wordIdx < end; wordIdx++) {
      const node = modifiedNodes[wordIdx];
      const el = document.getElementById('clause-' + (node.id || '').replace(/\./g, '-'));
      if (!el) continue;
      const cells = el.querySelectorAll('.diff-word-content');
      if (cells.length < 2) continue;
      const { leftHtml, rightHtml } = renderWordDiffHtml(node.old_body || '', node.new_body || '');
      cells[0].innerHTML = leftHtml || escapeHtml(node.old_body || '');
      cells[1].innerHTML = rightHtml || escapeHtml(node.new_body || '');
    }
    if (wordIdx < modifiedNodes.length) {
      requestAnimationFrame(processWordBatch);
    }
  }
  if (modifiedNodes.length > 0) {
    requestAnimationFrame(processWordBatch);
  }
}

function clauseDiffHtml(node, spec, oldVersion, newVersion, skipWordDiff) {
  const status = node.status || 'unchanged';
  const id = node.id || '';
  const title = node.title || '';
  const clauseId = 'clause-' + id.replace(/\./g, '-');
  const hidden = status === 'unchanged' && !_showUnchanged ? ' style="display:none"' : '';

  let bodyHtml = '';

  if (status === 'unchanged') {
    const imgs = renderImageThumbnails(node.images, spec, newVersion);
    const body = node.body || '';
    const collapsed = body.length > 300 ? ' collapsed' : '';
    bodyHtml = imgs + `<div class="clause-body${collapsed}">${escapeHtml(body || '(no content)')}</div>`;
    if (body.length > 300) {
      bodyHtml += `<button class="expand-btn" onclick="this.previousElementSibling.classList.toggle('collapsed');this.textContent=this.previousElementSibling.classList.contains('collapsed')?'Show more':'Show less';">Show more</button>`;
    }
  } else if (status === 'added') {
    const imgs = renderImageThumbnails(node.images, spec, newVersion);
    const body = node.body || '';
    bodyHtml = `<div class="diff-view">
      <div class="diff-pane">
        <div class="diff-pane-header old">(empty)</div>
        <div class="diff-empty">Clause did not exist in the old version</div>
      </div>
      <div class="diff-pane">
        <div class="diff-pane-header new">New</div>
        ${imgs}
        <div class="diff-line add">
          <span class="diff-line-num"></span>
          <span class="diff-line-content">${escapeHtml(body || '(no content)')}</span>
        </div>
      </div>
    </div>`;
  } else if (status === 'deleted') {
    const imgs = renderImageThumbnails(node.images, spec, oldVersion);
    const body = node.body || '';
    bodyHtml = `<div class="diff-view">
      <div class="diff-pane">
        <div class="diff-pane-header old">Removed</div>
        ${imgs}
        <div class="diff-line del">
          <span class="diff-line-num"></span>
          <span class="diff-line-content">${escapeHtml(body || '(no content)')}</span>
        </div>
      </div>
      <div class="diff-pane">
        <div class="diff-pane-header new">(empty)</div>
        <div class="diff-empty">Clause removed in the new version</div>
      </div>
    </div>`;
  } else if (status === 'modified') {
    const oldImgs = renderImageThumbnails(node.old_images, spec, oldVersion);
    const newImgs = renderImageThumbnails(node.new_images, spec, newVersion);
    const oldText = node.old_body || '';
    const newText = node.new_body || '';

    let wordLeft, wordRight;
    if (skipWordDiff) {
      // First pass: no word-level LCS, use plain escaped text for instant first paint
      wordLeft = wordRight = '';
    } else {
      // Compute word-level diff for inline highlighting
      const result = renderWordDiffHtml(oldText, newText);
      wordLeft = result.leftHtml;
      wordRight = result.rightHtml;
    }

    bodyHtml = `<div class="diff-view">
      <div class="diff-pane">
        <div class="diff-pane-header old">v${oldVersion || 'Old'}</div>
        ${oldImgs}
        <div class="diff-line"><div class="diff-word-content">${wordLeft || escapeHtml(oldText) || '(no content)'}</div></div>
      </div>
      <div class="diff-pane">
        <div class="diff-pane-header new">v${newVersion || 'New'}</div>
        ${newImgs}
        <div class="diff-line"><div class="diff-word-content">${wordRight || escapeHtml(newText) || '(no content)'}</div></div>
      </div>
    </div>`;
  }

  return `<div class="clause-diff ${status}" id="${clauseId}" data-clause-id="${escapeHtml(id)}"${hidden}>
    <div class="clause-diff-header">
      <span class="clause-id">${escapeHtml(id)}</span>
      <span>${escapeHtml(title)}</span>
      <span class="status-badge ${status}">${status}</span>
    </div>
    ${bodyHtml}
  </div>`;
}

// ===================== WORD-LEVEL DIFF =====================
function renderWordDiffHtml(oldText, newText) {
  // Split tokens finer: words, punctuation, whitespace each separate
  // So "UE, " → ["UE", ",", " "] and "UE " → ["UE", " "]
  // LCS then matches "UE" and " " as equal, shows only comma as changed
  const tokenize = (text) => text.match(/\w+|[^\w\s]|\s+/g) || [];
  const a = tokenize(oldText);
  const b = tokenize(newText);
  const n = a.length, m = b.length;

  // LCS DP table
  const dp = Array.from({length: n + 1}, () => new Array(m + 1).fill(0));
  for (let i = 1; i <= n; i++) {
    for (let j = 1; j <= m; j++) {
      if (a[i - 1] === b[j - 1]) {
        dp[i][j] = dp[i - 1][j - 1] + 1;
      } else {
        dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
      }
    }
  }

  // Backtrack to get opcodes
  const ops = [];
  let i = n, j = m;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i - 1] === b[j - 1]) {
      ops.push(['equal', i - 1, i, j - 1, j]);
      i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
      ops.push(['insert', i, i, j - 1, j]);
      j--;
    } else {
      ops.push(['delete', i - 1, i, j, j]);
      i--;
    }
  }
  ops.reverse();

  // Merge consecutive same-type opcodes
  const merged = [];
  for (const op of ops) {
    if (merged.length > 0 && merged[merged.length - 1][0] === op[0]) {
      const last = merged[merged.length - 1];
      last[2] = op[2];
      last[4] = op[4];
    } else {
      merged.push([...op]);
    }
  }

  // Build HTML for left (old) and right (new) panes
  let leftHtml = '', rightHtml = '';
  for (const [op, oldStart, oldEnd, newStart, newEnd] of merged) {
    if (op === 'equal') {
      for (let k = oldStart; k < oldEnd; k++) {
        const t = escapeHtml(a[k]);
        leftHtml += t;
        rightHtml += t;
      }
    } else if (op === 'delete') {
      for (let k = oldStart; k < oldEnd; k++) {
        leftHtml += `<span class="word-del">${escapeHtml(a[k])}</span>`;
      }
    } else if (op === 'insert') {
      for (let k = newStart; k < newEnd; k++) {
        rightHtml += `<span class="word-add">${escapeHtml(b[k])}</span>`;
      }
    }
  }

  return { leftHtml, rightHtml };
}

// Simple diff sequence generator (returns opcodes)
function diffSequence(a, b) {
  const n = a.length, m = b.length;
  const dp = Array.from({length: n + 1}, () => Array(m + 1).fill(0));

  for (let i = 1; i <= n; i++) {
    for (let j = 1; j <= m; j++) {
      if (a[i - 1] === b[j - 1]) {
        dp[i][j] = dp[i - 1][j - 1] + 1;
      } else {
        dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
      }
    }
  }

  // Backtrack to get opcodes
  const ops = [];
  let i = n, j = m;
  const reverse = [];

  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i - 1] === b[j - 1]) {
      reverse.push(['equal', i - 1, i, j - 1, j]);
      i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j - 1] >= dp[i - 1][j])) {
      reverse.push(['insert', i, i, j - 1, j]);
      j--;
    } else {
      reverse.push(['delete', i - 1, i, j, j]);
      i--;
    }
  }

  reverse.reverse();

  // Merge consecutive same-type
  const merged = [];
  for (const op of reverse) {
    if (merged.length > 0 && merged[merged.length - 1][0] === op[0]) {
      const last = merged[merged.length - 1];
      last[2] = op[2];
      last[4] = op[4];
    } else {
      merged.push([...op]);
    }
  }

  return merged;
}

// ===================== SCROLL TO CLAUSE =====================
function scrollToClause(clauseId) {
  const el = document.getElementById('clause-' + clauseId.replace(/\./g, '-'));
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    // Highlight active in TOC
    document.querySelectorAll('.toc-item').forEach(e => e.classList.remove('active'));
    document.querySelector(`.toc-item[data-id="${CSS.escape(clauseId)}"]`)?.classList.add('active');
  }
}

// ===================== MAIN FLOW =====================
async function runDiff(refresh) {
  const v1 = $('v1Select').value;
  const v2 = $('v2Select').value;

  if (!v1 || !v2) {
    alert('Please select both versions');
    return;
  }

  if (v1 === v2) {
    alert('Please select two different versions');
    return;
  }

  // Ensure v1 < v2 (version comparison)
  const p1 = v1.split('.').map(Number);
  const p2 = v2.split('.').map(Number);
  for (let i = 0; i < Math.max(p1.length, p2.length); i++) {
    const a = p1[i] || 0, b = p2[i] || 0;
    if (a > b) {
      alert('Old version must be earlier than new version');
      return;
    }
    if (a < b) break;
  }

  $('diffBtn').disabled = true;
  $('diffBtn').textContent = 'Loading...';
  $('content').innerHTML = '<div class="loading">Computing diff</div>';
  $('refreshBtn').style.display = 'none';

  try {
    const diff = await fetchDiff(state.currentSpec, v1, v2, refresh);
    state.diffData = diff;
    renderDiff(diff);
    $('refreshBtn').style.display = '';
  } catch (err) {
    $('content').innerHTML = `<div class="error-msg">Error: ${escapeHtml(err.message)}</div>`;
  } finally {
    $('diffBtn').disabled = false;
    $('diffBtn').textContent = 'Compare';
  }
}

// ===================== EVENT BINDING =====================
$('specSelect').addEventListener('change', loadVersions);
$('diffBtn').addEventListener('click', () => runDiff());
$('downloadBtn').addEventListener('click', downloadSpec);
$('specInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') downloadSpec();
});

// TOC toggle
$('tocToggle').addEventListener('click', () => {
  const tree = $('tocTree');
  const isHidden = tree.style.display === 'none';
  tree.style.display = isHidden ? 'block' : 'none';
  $('tocToggle').innerHTML = isHidden ? '&#9660; Table of Contents' : '&#9654; Table of Contents';
});

// Keyboard shortcut (Enter on Compare button or version selects)
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON')) {
    if (e.target === $('diffBtn') || e.target.id === 'v1Select' || e.target.id === 'v2Select') {
      runDiff();
    }
  }
});

// ===================== INIT =====================
loadSpecs();
</script>
