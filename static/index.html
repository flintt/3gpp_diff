<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3GPP Spec Diff Tool</title>
  <link rel="stylesheet" href="static/css/main.css">
</head>
<body>

<div class="header">
  <h1><span>⚙</span> 3GPP Spec Diff</h1>
  <div class="selector-group" id="specGroup">
    <label for="specSelect">Spec</label>
    <select id="specSelect">
      <option value="">Select spec...</option>
    </select>
    <input type="text" id="specInput" placeholder="New spec e.g. 23.501">
    <button class="btn" id="downloadBtn">Download</button>
    <span id="downloadProgress" style="display:none;color:var(--text-secondary);font-size:12px;margin-left:8px;"></span>
  </div>
  <div class="selector-group">
    <label for="v1Select">Old Version</label>
    <select id="v1Select">
      <option value="">Select version...</option>
    </select>
  </div>
  <div class="selector-group">
    <label for="v2Select">New Version</label>
    <select id="v2Select">
      <option value="">Select version...</option>
    </select>
  </div>
  <button class="btn" id="diffBtn" disabled>Compare</button>
  <button class="btn btn-secondary" id="refreshBtn" style="display:none" onclick="window.runDiff(true)">⟳ Refresh</button>
</div>

<div class="stats-bar" id="statsBar" style="display:none">
  <span class="stat stat-total" id="statTotal"></span>
  <span class="stat stat-added" id="statAdded"></span>
  <span class="stat stat-deleted" id="statDeleted"></span>
  <span class="stat stat-modified" id="statModified"></span>
</div>

<div class="main">
  <div class="toc" id="toc">
    <div class="toc-toggle" id="tocToggle">Table of Contents <span>▶</span></div>
    <div class="toc-search" id="tocSearch" style="display:none">
      <input type="text" id="tocSearchInput" placeholder="Filter: comma-separated keywords">
    </div>
    <div class="toc-tree-container">
      <div id="tocTree"></div>
    </div>
  </div>
  <div class="content" id="content">
    <div class="welcome" id="welcome">
      <h2>📄 3GPP Specification Diff</h2>
      <p>Select a specification and two versions above, then click <strong>Compare</strong> to see the difference.</p>
      <p style="font-size:12px;color:var(--text-secondary)">
        Data sourced from <a href="https://www.3gpp.org" target="_blank" style="color:var(--accent);text-decoration:none;">3gpp.org</a>.<br>
        Supports TS 23.501/502/503, 38.300/401, 33.501 for Rel-15 through Rel-19.
      </p>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="window.closeLightbox()">
  <span class="lightbox-close" onclick="event.stopPropagation();window.closeLightbox()">&times;</span>
  <img class="lightbox-content" id="lightboxImg" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
  <div class="lightbox-controls" onclick="event.stopPropagation()">
    <button onclick="window.zoomLightbox(-1)" title="Zoom out (−)">−</button>
    <button onclick="window.zoomLightbox(0)" title="Reset (0)" style="font-size:11px;font-weight:600;letter-spacing:0.5px">1:1</button>
    <button onclick="window.zoomLightbox(1)" title="Zoom in (+)">+</button>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="clause-nav" id="clauseNav">
  <button onclick="window.navChanged(-1)" title="Previous changed (Shift+N)">‹ Prev</button>
  <span class="nav-count" id="navCount"></span>
  <button onclick="window.navChanged(1)" title="Next changed (N)">Next ›</button>
</div>

<script src="static/js/app.js" defer></script>
</body>
</html>
